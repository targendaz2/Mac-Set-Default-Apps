run_tests_task:
  macos_instance:
    image: ghcr.io/cirruslabs/macos-ventura-xcode:latest

  local_brew_cache:
    folder: "$HOME/Library/Caches/Homebrew"

  chrome_cache:
    folder: /Applications/Google Chrome.app
    populate_script:
      - brew install --force google-chrome

  venv_cache:
    folder: .venv
    reupload_on_changes: true

  dependencies_script:
    - brew install --force poetry
    - rm -rf .venv
    - poetry config virtualenvs.in-project true
    - poetry install

  run_tests_script:
    - poetry run pytest --html=$RESULTS_FILENAME --self-contained-html --suppress-tests-failed-exit-code

  before_cache_script:
    - brew cleanup

  always:
    results_artifacts:
      path: ./*.html
